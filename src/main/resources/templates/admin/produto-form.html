<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title th:text="${isEdicao} ? 'Editar Produto' : 'Novo Produto'">Produto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-bg">
<header class="admin-topbar">
    <div class="admin-brand">
        <img class="admin-brand-logo" th:src="@{/img/logo.png}" src="/img/logo.png" alt="Logo MG Recheados">
        <div>
            <h1 th:text="${isEdicao} ? 'Editar produto' : 'Novo produto'">Produto</h1>
            <p>Painel administrativo MG Recheados</p>
        </div>
    </div>
    <a th:href="@{/admin/dashboard}" class="ghost-btn">Voltar</a>
</header>

<main class="admin-content form-content">
    <div class="alert error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <form class="admin-form"
                th:action="${isEdicao} ? @{/admin/produtos/{id}/editar(id=${produto.id})} : @{/admin/produtos}"
            method="post"
            enctype="multipart/form-data"
                th:object="${produtoForm}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <label for="nome">Nome</label>
        <input id="nome" type="text" th:field="*{nome}" required>

        <label for="descricao">Descricao</label>
        <textarea id="descricao" th:field="*{descricao}" rows="4" required></textarea>

        <label for="peso">Peso</label>
        <input id="peso" type="text" th:field="*{peso}" placeholder="Ex: 500g" required>

        <label for="preco">Preco</label>
        <input id="preco" type="number" th:field="*{preco}" min="0" step="0.01" required>

        <label class="inline-check" for="ativo">
            <input id="ativo" type="checkbox" th:field="*{ativo}">
            Produto ativo
        </label>

        <div class="current-image" th:if="${isEdicao and produto.imagemUrl != null and !#strings.isEmpty(produto.imagemUrl)}">
            <p>Imagem atual:</p>
            <img th:src="@{'/uploads/' + ${produto.imagemUrl}}" alt="Foto atual do produto">
        </div>

        <label for="imagemFile" th:text="${isEdicao} ? 'Nova imagem (opcional)' : 'Imagem do produto (obrigatoria)'">Imagem</label>
        <input id="imagemFile" type="file" name="imagemFile" accept="image/*" th:attr="required=${!isEdicao}">

        <button type="submit" class="primary-btn" th:text="${isEdicao} ? 'Salvar alteracoes' : 'Cadastrar produto'">Salvar</button>
    </form>
</main>
</body>
</html>
