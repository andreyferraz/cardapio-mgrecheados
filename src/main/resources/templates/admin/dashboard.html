<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard Admin | MG Recheados</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-bg">
<header class="admin-topbar">
    <div class="admin-brand">
        <img class="admin-brand-logo" th:src="@{/img/logo.png}" src="/img/logo.png" alt="Logo MG Recheados">
        <div>
            <h1>Admin de Produtos</h1>
            <p>Gestão do cardápio digital</p>
        </div>
    </div>
    <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="ghost-btn">Sair</button>
    </form>
</header>

<main class="admin-content">
    <div class="actions-row">
        <a th:href="@{/admin/produtos/novo}" class="primary-btn">Novo produto</a>
        <a th:href="@{/cardapio}" class="ghost-btn">Ver cardápio público</a>
    </div>

    <div class="alert success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <section class="admin-grid" th:if="${!#lists.isEmpty(produtos)}">
        <article class="admin-product-card" th:each="produto : ${produtos}">
            <img class="admin-product-image"
                 th:if="${produto.imagemUrl != null and !#strings.isEmpty(produto.imagemUrl)}"
                 th:src="@{'/uploads/' + ${produto.imagemUrl}}"
                 th:alt="${produto.nome}">
            <div class="admin-product-body">
                <h2 th:text="${produto.nome}">Produto</h2>
                <p th:text="${produto.descricao}">Descrição</p>
                <div class="meta-row">
                    <span th:text="${produto.peso}">500g</span>
                    <strong th:text="${#numbers.formatCurrency(produto.preco)}">R$ 0,00</strong>
                </div>
                <div class="meta-row">
                    <span>Status</span>
                    <strong th:text="${produto.ativo ? 'Ativo' : 'Inativo'}">Ativo</strong>
                </div>
                <div class="card-actions">
                    <a class="ghost-btn" th:href="@{'/admin/produtos/' + ${produto.id} + '/editar'}">Editar</a>
                    <form th:action="@{'/admin/produtos/' + ${produto.id} + '/excluir'}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="danger-btn" type="submit">Excluir</button>
                    </form>
                </div>
            </div>
        </article>
    </section>

    <section class="empty-card" th:if="${#lists.isEmpty(produtos)}">
        <h2>Nenhum produto cadastrado</h2>
        <p>Comece adicionando o primeiro item do seu cardápio.</p>
    </section>
</main>
</body>
</html>
