<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Login Admin | MG Recheados</title>
    <link rel="icon" type="image/png" th:href="@{/img/logo.png}" href="/img/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-bg">
<main class="auth-shell">
    <section class="auth-card">
        <img class="auth-logo" th:src="@{/img/logo.png}" src="/img/logo.png" alt="Logo MG Recheados">
        <h1>Painel Administrativo</h1>
        <p>Entre com suas credenciais para gerenciar os produtos do cardapio.</p>

        <div class="alert error" th:if="${param.error}">Usuario ou senha invalidos.</div>
        <div class="alert success" th:if="${param.logout}">Sessao encerrada com sucesso.</div>

        <form class="auth-form" th:action="@{/login}" method="post">
            <label for="username">Usuario</label>
            <input id="username" name="username" type="text" required autocomplete="username">

            <label for="password">Senha</label>
            <input id="password" name="password" type="password" required autocomplete="current-password">

            <button type="submit">Entrar</button>
        </form>
    </section>
</main>
</body>
</html>
